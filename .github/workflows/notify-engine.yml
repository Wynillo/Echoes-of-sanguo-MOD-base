on:
  push:
    tags: ['v*']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: Wynillo/Echoes-of-Sanguo-ENGINE
          event-type: mod-base-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
