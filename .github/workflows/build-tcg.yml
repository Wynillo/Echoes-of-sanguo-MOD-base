name: Build TCG Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:tcg

      - uses: actions/upload-artifact@v4
        with:
          name: base-tcg
          path: dist/base.tcg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: base-tcg
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/base.tcg
          generate_release_notes: true
