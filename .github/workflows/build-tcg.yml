name: Build TCG Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0) — will create tag v<version> and publish a GitHub release'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build:tcg

      - uses: actions/upload-artifact@v4
        with:
          name: base-tcg
          path: dist/base.tcg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: base-tcg
          path: dist

      - name: Check if release already exists
        id: check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: softprops/action-gh-release@v2
        if: steps.check.outputs.exists == 'false' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', steps.pkg.outputs.version) }}
          files: dist/base.tcg
          generate_release_notes: true
