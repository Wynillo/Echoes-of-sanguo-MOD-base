<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="mg-machine" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#90a0b0"/>
      <stop offset="45%" stop-color="#708090"/>
      <stop offset="100%" stop-color="#080c10"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="#060810"/>
  <circle cx="128" cy="125" r="110" fill="url(#mg-machine)" opacity="0.6"/>
  <!-- Large gear -->
  <circle cx="110" cy="110" r="40" fill="none" stroke="#8090a0" stroke-width="3" opacity="0.4"/>
  <circle cx="110" cy="110" r="30" fill="none" stroke="#90a0b0" stroke-width="2" opacity="0.3"/>
  <circle cx="110" cy="110" r="8" fill="#607080" opacity="0.4"/>
  <!-- Gear teeth (large) -->
  <rect x="105" y="66" width="10" height="10" fill="#8090a0" opacity="0.35" rx="1"/>
  <rect x="105" y="144" width="10" height="10" fill="#8090a0" opacity="0.35" rx="1"/>
  <rect x="66" y="105" width="10" height="10" fill="#8090a0" opacity="0.35" rx="1"/>
  <rect x="144" y="105" width="10" height="10" fill="#8090a0" opacity="0.35" rx="1"/>
  <rect x="79" y="79" width="9" height="9" fill="#8090a0" opacity="0.3" rx="1" transform="rotate(45 83.5 83.5)"/>
  <rect x="132" y="132" width="9" height="9" fill="#8090a0" opacity="0.3" rx="1" transform="rotate(45 136.5 136.5)"/>
  <rect x="132" y="79" width="9" height="9" fill="#8090a0" opacity="0.3" rx="1" transform="rotate(45 136.5 83.5)"/>
  <rect x="79" y="132" width="9" height="9" fill="#8090a0" opacity="0.3" rx="1" transform="rotate(45 83.5 136.5)"/>
  <!-- Small gear -->
  <circle cx="165" cy="150" r="25" fill="none" stroke="#8090a0" stroke-width="2.5" opacity="0.35"/>
  <circle cx="165" cy="150" r="18" fill="none" stroke="#90a0b0" stroke-width="1.5" opacity="0.25"/>
  <circle cx="165" cy="150" r="6" fill="#607080" opacity="0.35"/>
  <!-- Small gear teeth -->
  <rect x="161" y="122" width="8" height="8" fill="#8090a0" opacity="0.3" rx="1"/>
  <rect x="161" y="170" width="8" height="8" fill="#8090a0" opacity="0.3" rx="1"/>
  <rect x="137" y="146" width="8" height="8" fill="#8090a0" opacity="0.3" rx="1"/>
  <rect x="185" y="146" width="8" height="8" fill="#8090a0" opacity="0.3" rx="1"/>
  <!-- Angular mechanical lines -->
  <line x1="60" y1="190" x2="100" y2="180" stroke="#708090" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="180" x2="120" y2="200" stroke="#708090" stroke-width="2" opacity="0.3"/>
  <line x1="170" y1="185" x2="200" y2="195" stroke="#708090" stroke-width="2" opacity="0.3"/>
  <!-- Inner glow -->
  <circle cx="128" cy="125" r="20" fill="#708090" opacity="0.12"/>
  <!-- Floating particles (sparks) -->
  <circle cx="55" cy="70" r="2" fill="#b0c0d0" opacity="0.6"/>
  <circle cx="210" cy="80" r="2" fill="#a0b0c0" opacity="0.5"/>
  <circle cx="45" cy="180" r="1.5" fill="#90a0b0" opacity="0.4"/>
  <circle cx="215" cy="175" r="1.5" fill="#b0c0d0" opacity="0.4"/>
  <!-- Sparkles -->
  <text x="40" y="55" font-size="9" fill="#b0c0d0" opacity="0.5">&#x2726;</text>
  <text x="205" y="60" font-size="8" fill="#a0b0c0" opacity="0.4">&#x2726;</text>
</svg>