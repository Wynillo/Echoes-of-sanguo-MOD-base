<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="mg-plant" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#60c070"/>
      <stop offset="45%" stop-color="#40a050"/>
      <stop offset="100%" stop-color="#041008"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="#020a04"/>
  <circle cx="128" cy="115" r="110" fill="url(#mg-plant)" opacity="0.6"/>
  <!-- Central vine/stem -->
  <path d="M128,230 Q125,190 128,160 Q130,130 128,100 Q126,80 128,60" fill="none" stroke="#50b060" stroke-width="3" opacity="0.5"/>
  <!-- Vine tendrils left -->
  <path d="M128,160 Q100,150 80,130 Q65,115 60,95" fill="none" stroke="#40a050" stroke-width="2.5" opacity="0.5"/>
  <path d="M128,130 Q105,125 90,110" fill="none" stroke="#40a050" stroke-width="2" opacity="0.4"/>
  <!-- Vine tendrils right -->
  <path d="M128,145 Q155,138 175,120 Q190,105 195,85" fill="none" stroke="#40a050" stroke-width="2.5" opacity="0.5"/>
  <path d="M128,120 Q150,115 168,100" fill="none" stroke="#40a050" stroke-width="2" opacity="0.4"/>
  <!-- Lotus/flower top -->
  <ellipse cx="128" cy="55" rx="18" ry="10" fill="#60c070" opacity="0.4"/>
  <ellipse cx="118" cy="60" rx="12" ry="8" fill="#50b060" opacity="0.3" transform="rotate(-30 118 60)"/>
  <ellipse cx="138" cy="60" rx="12" ry="8" fill="#50b060" opacity="0.3" transform="rotate(30 138 60)"/>
  <circle cx="128" cy="55" r="5" fill="#a0e0a0" opacity="0.5"/>
  <!-- Leaves -->
  <ellipse cx="70" cy="125" rx="15" ry="8" fill="#40a050" opacity="0.3" transform="rotate(-20 70 125)"/>
  <ellipse cx="185" cy="115" rx="15" ry="8" fill="#40a050" opacity="0.3" transform="rotate(15 185 115)"/>
  <!-- Inner glow -->
  <circle cx="128" cy="100" r="25" fill="#40a050" opacity="0.15"/>
  <!-- Floating particles (pollen/spores) -->
  <circle cx="75" cy="70" r="2" fill="#a0e0a0" opacity="0.6"/>
  <circle cx="185" cy="65" r="2" fill="#80d080" opacity="0.5"/>
  <circle cx="55" cy="150" r="1.5" fill="#60c070" opacity="0.5"/>
  <circle cx="200" cy="140" r="1.5" fill="#a0e0a0" opacity="0.4"/>
  <circle cx="100" cy="40" r="1.5" fill="#80d080" opacity="0.5"/>
  <circle cx="160" cy="45" r="1.5" fill="#a0e0a0" opacity="0.4"/>
  <!-- Sparkles -->
  <text x="50" y="55" font-size="9" fill="#a0e0a0" opacity="0.5">&#x2726;</text>
  <text x="195" y="55" font-size="8" fill="#80d080" opacity="0.4">&#x2726;</text>
</svg>